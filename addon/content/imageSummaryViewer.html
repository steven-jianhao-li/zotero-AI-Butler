<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: rgba(0, 0, 0, 0.95);
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }

      #root {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: zoom-out;
      }

      #img {
        max-width: 98%;
        max-height: 98%;
        object-fit: contain;
      }

      #hint {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        padding: 6px 10px;
        background: rgba(0, 0, 0, 0.5);
        color: rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 999px;
        font-size: 12px;
        user-select: none;
        pointer-events: none;
      }

      #error {
        color: rgba(255, 255, 255, 0.85);
        font-size: 14px;
        padding: 20px;
        text-align: center;
        max-width: 600px;
        line-height: 1.5;
      }
    </style>
    <script>
      (function () {
        const zh = {
          pageTitle: "一图总结",
          alt: "一图总结",
          hint: "点击关闭，或按 Esc",
          noImage: "未提供图片数据。",
          failed: "图片加载失败。",
        };
        const en = {
          pageTitle: "One-image Summary",
          alt: "One-image Summary",
          hint: "Click to close, or press Esc",
          noImage: "No image data provided.",
          failed: "Failed to load image.",
        };
        function locale() {
          try {
            if (typeof Zotero !== "undefined" && Zotero.locale)
              return String(Zotero.locale);
          } catch (e) {}
          try {
            if (navigator.language) return navigator.language;
          } catch (e) {}
          return "zh-CN";
        }
        const map = locale().toLowerCase().startsWith("zh") ? zh : en;
        window.aiButlerL10n = function (key) {
          return map[key] || zh[key] || key;
        };
        document.documentElement.lang = locale().toLowerCase().startsWith("zh")
          ? "zh-CN"
          : "en-US";
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <img id="img" alt="" />
      <div id="error" style="display: none"></div>
    </div>
    <div id="hint"></div>

    <script>
      (function () {
        function getArgs() {
          try {
            return (window.arguments && window.arguments[0]) || {};
          } catch (e) {
            return {};
          }
        }

        const args = getArgs();
        const title =
          (args && args.title ? String(args.title) : "") ||
          (window.__aiButlerTitle ? String(window.__aiButlerTitle) : "") ||
          window.aiButlerL10n("pageTitle");
        const src =
          (args && args.imageDataUri ? String(args.imageDataUri) : "") ||
          (window.__aiButlerImageDataUri
            ? String(window.__aiButlerImageDataUri)
            : "");

        document.title = title;

        const img = document.getElementById("img");
        const err = document.getElementById("error");
        document.getElementById("hint").textContent =
          window.aiButlerL10n("hint");
        img.alt = window.aiButlerL10n("alt");

        if (!src) {
          img.style.display = "none";
          err.style.display = "block";
          err.textContent = window.aiButlerL10n("noImage");
          return;
        }

        img.src = src;
        img.addEventListener("error", () => {
          img.style.display = "none";
          err.style.display = "block";
          err.textContent = window.aiButlerL10n("failed");
        });

        const close = () => {
          try {
            window.close();
          } catch (e) {}
        };

        document.getElementById("root").addEventListener("click", close);
        window.addEventListener(
          "keydown",
          (e) => {
            if (e.key === "Escape") {
              e.preventDefault();
              close();
            }
          },
          true,
        );
      })();
    </script>
  </body>
</html>
