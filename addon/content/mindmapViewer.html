<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #ffffff;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }

      #frame {
        width: 100%;
        height: 100%;
        border: 0;
      }

      #error {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #d32f2f;
        font-size: 14px;
        padding: 20px;
        text-align: center;
        max-width: 720px;
        line-height: 1.5;
        display: none;
      }
    </style>
    <script>
      (function () {
        const zh = {
          pageTitle: "思维导图",
          frameTitle: "思维导图预览",
          noContent: "未提供思维导图内容。",
          exportDone: "导出完成",
          exportFailed: "导出失败",
          postFailed: "发送思维导图数据失败。",
          exportSavedTitle: "思维导图已导出",
          exportSavedText: "已保存到: {path}",
          errorPrefix: "错误: {message}",
        };
        const en = {
          pageTitle: "Mind Map",
          frameTitle: "Mind map preview",
          noContent: "No mind map content was provided.",
          exportDone: "Export complete",
          exportFailed: "Export failed",
          postFailed: "Failed to send mind map data.",
          exportSavedTitle: "Mind map exported",
          exportSavedText: "Saved to: {path}",
          errorPrefix: "Error: {message}",
        };
        function locale() {
          try {
            if (typeof Zotero !== "undefined" && Zotero.locale)
              return String(Zotero.locale);
          } catch (e) {}
          try {
            if (navigator.language) return navigator.language;
          } catch (e) {}
          return "zh-CN";
        }
        const map = locale().toLowerCase().startsWith("zh") ? zh : en;
        window.aiButlerL10n = function (key) {
          return map[key] || zh[key] || key;
        };
        window.aiButlerL10nArgs = function (key, args) {
          let value = window.aiButlerL10n(key);
          Object.keys(args || {}).forEach((name) => {
            value = value.replaceAll("{" + name + "}", String(args[name]));
          });
          return value;
        };
        document.documentElement.lang = locale().toLowerCase().startsWith("zh")
          ? "zh-CN"
          : "en-US";
      })();
    </script>
  </head>
  <body>
    <iframe id="frame" title=""></iframe>
    <div id="error"></div>

    <script>
      (function () {
        function getArgs() {
          try {
            return (window.arguments && window.arguments[0]) || {};
          } catch (e) {
            return {};
          }
        }

        const args = getArgs();
        document.getElementById("frame").title =
          window.aiButlerL10n("frameTitle");
        const title =
          (args && args.title ? String(args.title) : "") ||
          (window.__aiButlerTitle ? String(window.__aiButlerTitle) : "") ||
          window.aiButlerL10n("pageTitle");
        const markdown =
          (args && args.markdown ? String(args.markdown) : "") ||
          (window.__aiButlerMindmapMarkdown
            ? String(window.__aiButlerMindmapMarkdown)
            : "");
        const prefsPrefix =
          (args && args.prefsPrefix ? String(args.prefsPrefix) : "") ||
          (window.__aiButlerPrefsPrefix
            ? String(window.__aiButlerPrefsPrefix)
            : "");

        document.title = title;

        const errorEl = document.getElementById("error");
        const frame = document.getElementById("frame");
        frame.src = new URL(
          "mindmap.html?mode=viewer",
          window.location.href,
        ).href;

        if (!markdown) {
          errorEl.style.display = "block";
          errorEl.textContent = window.aiButlerL10n("noContent");
          return;
        }

        const getPref = (key) => {
          if (!prefsPrefix) return undefined;
          try {
            if (typeof Zotero !== "undefined" && Zotero.Prefs) {
              return Zotero.Prefs.get(`${prefsPrefix}.${key}`, true);
            }
          } catch (e) {}
          return undefined;
        };

        const notify = (title, text, type) => {
          try {
            new ztoolkit.ProgressWindow(title, {
              closeOnClick: true,
              closeTime: 3000,
            })
              .createLine({ text, type })
              .show();
          } catch (e) {}
        };

        const saveExport = async (payload) => {
          const format = payload.format || "png";
          const filename = payload.filename || `mindmap.${format}`;

          let downloadDir = "";
          const customPath = String(getPref("mindmapExportPath") || "");

          if (customPath && customPath.trim()) {
            downloadDir = customPath.trim();
            try {
              await IOUtils.makeDirectory(downloadDir, {
                ignoreExisting: true,
              });
            } catch (e) {
              downloadDir = "";
            }
          }

          if (!downloadDir) {
            try {
              const desktopDir = Services.dirsvc.get("Desk", Ci.nsIFile);
              downloadDir = desktopDir.path;
            } catch (e) {
              try {
                const dataDir = Zotero.DataDirectory.dir;
                downloadDir = PathUtils.join(dataDir, "mindmaps");
                await IOUtils.makeDirectory(downloadDir, {
                  ignoreExisting: true,
                });
              } catch (e2) {
                downloadDir = "";
              }
            }
          }

          if (!downloadDir) {
            throw new Error("No writable export directory.");
          }

          const filePath = PathUtils.join(downloadDir, filename);

          if (format === "png") {
            const dataUrl = payload.dataUrl || "";
            const base64Data = dataUrl.replace(/^data:image\/png;base64,/, "");
            const binaryString = atob(base64Data);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
              bytes[i] = binaryString.charCodeAt(i);
            }
            await IOUtils.write(filePath, bytes);
          } else if (format === "opml") {
            const content = String(payload.content || "");
            const encoder = new TextEncoder();
            await IOUtils.write(filePath, encoder.encode(content));
          }

          notify(
            window.aiButlerL10n("exportSavedTitle"),
            window.aiButlerL10nArgs("exportSavedText", { path: filePath }),
            "success",
          );
          try {
            Zotero.launchFile(filePath);
          } catch (e) {}
        };

        window.addEventListener("message", (event) => {
          if (!event.data || typeof event.data !== "object") return;

          if (event.data.type === "mindmap-ready") {
            try {
              frame.contentWindow.postMessage(
                { type: "render-mindmap", markdown },
                "*",
              );
            } catch (e) {
              errorEl.style.display = "block";
              errorEl.textContent = window.aiButlerL10n("postFailed");
            }
          }

          if (event.data.type === "export-mindmap") {
            saveExport(event.data).catch((e) => {
              notify(
                window.aiButlerL10n("exportFailed"),
                window.aiButlerL10nArgs("errorPrefix", { message: e }),
                "error",
              );
            });
          }
        });

        // Fallback: if the iframe is already loaded and ready message is missed
        frame.addEventListener("load", () => {
          setTimeout(() => {
            try {
              frame.contentWindow.postMessage(
                { type: "render-mindmap", markdown },
                "*",
              );
            } catch (e) {}
          }, 500);
        });

        window.addEventListener(
          "keydown",
          (e) => {
            if (e.key === "Escape") {
              try {
                window.close();
              } catch (err) {}
            }
          },
          true,
        );
      })();
    </script>
  </body>
</html>
